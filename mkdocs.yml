site_name: ENCODEfetch
site_description: Documentation for the ENCODEfetch command-line tool and Python API.
site_url: https://khan-lab.github.io/ENCODEfetch/
repo_url: https://github.com/khan-lab/ENCODEfetch
repo_name: khan-lab/ENCODEfetch

theme:
  name: material
  logo: img/logo.png
  favicon: img/logo.png
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

nav:
  - Home: index.md
  - Installation: installation.md
  - Quickstart: quickstart.md
  - Command Line: cli.md
  - Python API: api.md
  - Exporters: exporters.md
  - Assays: assays.md
  - Outputs: outputs.md
  - Examples: examples.md
  - Contributing: contributing.md
  - Changelog: changelog.md

markdown_extensions:
  - admonition
  - fenced_code
  - pymdownx.details
  - pymdownx.superfences
  - tables
  - toc:
      permalink: true

exclude_docs: |
  source/
